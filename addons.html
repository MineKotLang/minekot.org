<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineKot Addons</title>
    <meta name="description" content="Search and manage MineKot addons." />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("minekot.theme");
          var theme = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body data-page="addons-search">
    <div class="shell">
      <header class="topbar">
        <div class="container topbar-inner">
          <a class="brand" href="index.html">
            <span class="brand-mark"><img src="photos/icon.png" alt="MineKot icon" /></span>
            <span>MineKot</span>
          </a>
          <nav class="nav" aria-label="Main">
            <a href="index.html" data-theme-nav>Home</a>
            <a href="docs.html" data-theme-nav>Docs</a>
            <a href="addons.html" aria-current="page" data-theme-nav>Addons</a>
            <button type="button" class="btn" data-theme-toggle>Light mode</button>
            <a href="login.html" data-theme-nav>Login</a>
          </nav>
        </div>
      </header>

      <main class="page">
        <section class="container addons-shell">
          <article class="panel addons-header">
            <div class="kicker">Addons</div>
            <h1 class="workspace-title">Addon Search</h1>
            <p class="helper">Search uploaded addons, open each addon page, and download approved releases.</p>
            <form class="search-row" data-addon-search-form>
              <input
                class="search-input"
                type="search"
                placeholder="Search addon name, description, or dependency"
                aria-label="Search addons"
                data-addon-search-input
              />
              <button type="submit" class="btn primary">Search</button>
            </form>
          </article>

          <section class="addons-results" data-addon-results></section>

          <div class="panel docs-empty-state" data-addon-empty>
            <strong>Start by searching for an addon.</strong>
          </div>

          <section class="panel upload-panel" data-upload-shell hidden>
            <div class="panel-header compact">
              <h2 class="panel-title">Upload Plugin</h2>
            </div>
            <p class="helper">Uploads enter a moderation queue. Admins can approve or reject addons.</p>
            <form class="upload-form" data-upload-form>
              <input class="search-input" type="text" placeholder="Addon name" required data-upload-name />
              <textarea class="text-input" placeholder="Description" required data-upload-description></textarea>
              <input class="search-input" type="text" placeholder="Versions (comma-separated)" data-upload-versions />
              <input class="search-input" type="text" placeholder="Dependencies (comma-separated)" data-upload-dependencies />
              <input class="search-input" type="url" placeholder="Download URL (zip/jar/release link)" required data-upload-download-url />
              <input class="search-input" type="url" placeholder="Source page URL (optional)" data-upload-repo-url />
              <button type="submit" class="btn primary">Submit for review</button>
            </form>
          </section>

          <section class="panel moderation-panel" data-admin-shell hidden>
            <div class="panel-header compact">
              <h2 class="panel-title">Admin Review Queue</h2>
            </div>
            <div class="moderation-list" data-admin-queue></div>
          </section>

      </main>

    </div>
  </body>
</html>
