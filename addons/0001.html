<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineKot Addon</title>
    <meta name="description" content="Addon details and downloads." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="container topbar-inner">
          <a class="brand" href="../index.html">
            <span class="brand-mark"><img src="../photos/icon.png" alt="MineKot icon" /></span>
            <span>MineKot</span>
          </a>
          <nav class="nav" aria-label="Main">
            <a href="../index.html">Home</a>
            <a href="../docs.html">Docs</a>
            <a href="index.html">Addons</a>
          </nav>
        </div>
      </header>

      <main class="page">
        <section class="container addon-detail-shell">
          <article class="panel addon-detail-header fade-in">
            <div class="kicker">Addon</div>
            <h1 class="workspace-title">PLACEHOLDER</h1>
            <p class="helper">PLACEHOLDER</p>
            <div class="search-row">
              <a class="btn" href="index.html">Back to addons</a>
              <a class="btn primary" href="https://example.com/repository" target="_blank" rel="noopener noreferrer">Open source page</a>
              <a class="btn" href="https://example.com/download" target="_blank" rel="noopener noreferrer">Download addon</a>
            </div>
          </article>

          <section class="addon-meta-grid">
            <article class="panel addon-meta-card fade-in">
              <h2 class="panel-title">Latest Versions</h2>
              <ul class="addon-list">
                <li>1.69</li>
                <li>1.68</li>
                <li>1.67</li>
              </ul>
            </article>

            <article class="panel addon-meta-card fade-in">
              <h2 class="panel-title">Dependencies</h2>
              <p class="helper">Dependencies required by this addon.</p>
              <ul class="addon-list">
                <li>PLACEHOLDER</li>
                <li>PLACEHOLDER</li>
              </ul>
            </article>
          </section>
        </section>
      </main>

      <footer class="footer container">Addon Details</footer>
    </div>
  </body>
</html>
