<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineKot Addons</title>
    <meta name="description" content="Browse MineKot addons." />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("minekot.theme");
          var theme = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="../styles.css" />
    <script defer src="../app.js?v=20260405"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">

            <span>MineKot</span>
          </a>
          <nav class="nav" aria-label="Main">
            <a href="../index.html" data-theme-nav>Home</a>
            <a href="../docs.html" data-theme-nav>Docs</a>
            <a href="index.html" aria-current="page" data-theme-nav>Addons</a>
            <button type="button" class="btn" data-theme-toggle>Light mode</button>
          </nav>
        </div>
      </header>

      <main class="page">

          <article class="panel addons-header">
            <div class="kicker">Addons</div>
            <h1 class="workspace-title">Addons</h1>
            <p class="helper">Browse available addons and open the addon details page.</p>
          </article>

          <section class="addons-results">
