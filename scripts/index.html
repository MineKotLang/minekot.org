<!DOCTYPE html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>MineKot Scripts</title>
		<meta name="description" content="Browse small reusable scripts." />
		<script>
			(function () {
				try {
					var stored = localStorage.getItem("minekot.theme");
					var theme = stored === "light" || stored === "dark" ? stored : "dark";
					document.documentElement.setAttribute("data-theme", theme);
				} catch (error) {
					document.documentElement.setAttribute("data-theme", "dark");
				}
			})();
		</script>
		<link rel="stylesheet" href="../styles.css" />
		<script defer src="../app.js?v=20260405"></script>
	</head>
	<body>
		<div class="shell">
			<header class="topbar">
				<div class="container topbar-inner">
					<a class="brand" href="../">
						<span class="brand-mark"><img src="../images/icon.png" alt="MineKot icon" /></span>
						<span>MineKot</span>
					</a>
					<nav class="nav" aria-label="Main">
						<a href="../" data-theme-nav>Home</a>
						<a href="../docs/" data-theme-nav>Docs</a>
						<a href="../addons/" data-theme-nav>Addons</a>
						<a href="./" aria-current="page" data-theme-nav>Scripts</a>
						<button type="button" class="btn" data-theme-toggle>Light mode</button>
					</nav>
				</div>
			</header>

			<main class="page">
				<section class="container addons-shell">
					<article class="panel addons-header">
						<div class="kicker">Scripts</div>
						<h1 class="workspace-title">Scripts</h1>
					</article>

					<section class="addons-results">
						<article class="panel addon-result-card fade-in">
							<h2 class="card-title">PLACEHOLDER</h2>
							<p class="helper">PLACEHOLDER</p>
							<pre id="snippet-1" class="code-block">placeholder script snippet</pre>
							<div class="search-row">
								<button type="button" class="btn primary" data-copy-snippet="snippet-1">Copy</button>
							</div>
						</article>

						<article class="panel addon-result-card fade-in">
							<h2 class="card-title">PLACEHOLDER</h2>
							<p class="helper">PLACEHOLDER</p>
							<pre id="snippet-2" class="code-block">placeholder script snippet</pre>
							<div class="search-row">
								<button type="button" class="btn primary" data-copy-snippet="snippet-2">Copy</button>
							</div>
						</article>

						<article class="panel addon-result-card fade-in">
							<h2 class="card-title">PLACEHOLDER</h2>
							<p class="helper">PLACEHOLDER</p>
							<pre id="snippet-3" class="code-block">placeholder script snippet</pre>
							<div class="search-row">
								<button type="button" class="btn primary" data-copy-snippet="snippet-3">Copy</button>
							</div>
						</article>

						<article class="panel addon-result-card fade-in">
							<h2 class="card-title">PLACEHOLDER</h2>
							<p class="helper">PLACEHOLDER</p>
							<pre id="snippet-4" class="code-block">placeholder script snippet</pre>
							<div class="search-row">
								<button type="button" class="btn primary" data-copy-snippet="snippet-4">Copy</button>
							</div>
						</article>
					</section>
				</section>
			</main>

			<script>
				(function () {
					var buttons = document.querySelectorAll("[data-copy-snippet]");

					buttons.forEach(function (button) {
						button.addEventListener("click", async function () {
							var targetId = button.getAttribute("data-copy-snippet");
							var snippet = targetId ? document.getElementById(targetId) : null;
							if (!snippet) return;

							var originalLabel = button.textContent;
							try {
								await navigator.clipboard.writeText(snippet.textContent || "");
								button.textContent = "Copied";
							} catch (error) {
								button.textContent = "Copy failed";
							}

							setTimeout(function () {
								button.textContent = originalLabel;
							}, 1100);
						});
					});
				})();
			</script>

			<footer class="footer container">Community Scripts</footer>
		</div>
	</body>
</html>
